name: 自动任务

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

env:
  TZ: "Asia/Shanghai"
  TOKENS: ${{ secrets.TOKENS }}

jobs:
  main:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.x
      - name: 执行脚本
        run: node index.js && node yqds.js
